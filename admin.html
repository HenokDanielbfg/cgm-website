<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Christ Generation Ministry</title>

  <style>
    :root{
      --bg: #0b0c0f;
      --panel: #0f1118;
      --panel2: #0c0f14;
      --text: #f3f0e6;
      --muted: #c9c3b1;
      --gold: #d4af37;
      --gold2: #e8d9a8;
      --gold3: #b88a1a;
      --border: rgba(212,175,55,.28);
      --shadow: 0 18px 50px rgba(0,0,0,.55);
      --radius: 22px;
      --max: 1100px;
    }

    *{ box-sizing: border-box; }
    html{ scroll-behavior: smooth; }
    body{
      margin:0;
      color: var(--text);
      background:
        radial-gradient(900px 520px at 10% 0%, rgba(212,175,55,.09), transparent 55%),
        radial-gradient(850px 520px at 100% 10%, rgba(232,217,168,.06), transparent 55%),
        linear-gradient(180deg, #07080b 0%, var(--bg) 30%, #07080b 100%);
      font: 16px/1.6 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans";
      letter-spacing: .2px;
      min-height: 100vh;
    }

    .wrap{
      width: min(var(--max), calc(100% - 48px));
      margin: 0 auto;
    }

    /* Top bar */
    .topbar{
      position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(10px);
      background: rgba(8,9,12,.65);
      border-bottom: 1px solid rgba(212,175,55,.18);
    }
    .topbar-inner{
      display: flex; align-items: center; justify-content: space-between;
      gap: 18px; padding: 14px 0;
    }
    .brand{
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; color: var(--text); white-space: nowrap;
    }
    .logo{
      width: 34px; height: 34px; border-radius: 11px; object-fit: cover;
      border: 1px solid rgba(232,217,168,.35);
      box-shadow: 0 10px 30px rgba(212,175,55,.18);
      background: rgba(0,0,0,.2);
    }
    .brand strong{ font-weight: 700; }
    .topbar-right{
      display: flex; align-items: center; gap: 14px;
      color: var(--muted); font-size: 14px;
    }

    /* Buttons */
    .btn{
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 22px; border-radius: 14px; font-size: 15px; font-weight: 600;
      cursor: pointer; border: 1px solid transparent; transition: .2s;
      text-decoration: none;
    }
    .btn-primary{
      background: linear-gradient(135deg, var(--gold), var(--gold3));
      color: #0b0c0f; border-color: rgba(232,217,168,.35);
    }
    .btn-primary:hover{ filter: brightness(1.1); }
    .btn-ghost{
      background: transparent; color: var(--muted); border-color: transparent;
    }
    .btn-ghost:hover{ color: var(--text); background: rgba(255,255,255,.05); }
    .btn-outline{
      background: transparent; color: var(--gold2);
      border-color: var(--border);
    }
    .btn-outline:hover{ background: rgba(212,175,55,.08); }
    .btn-danger{
      background: transparent; color: #e85454;
      border-color: rgba(232,84,84,.3);
    }
    .btn-danger:hover{ background: rgba(232,84,84,.1); }
    .btn-sm{ padding: 6px 14px; font-size: 13px; border-radius: 10px; }

    /* Login */
    #loginScreen{
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 80px); padding: 40px 24px;
    }
    .login-box{
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px 36px;
      box-shadow: var(--shadow); width: 100%; max-width: 420px;
      text-align: center;
    }
    .login-box h2{ margin-bottom: 6px; font-size: 24px; }
    .login-box p{ font-size: 14px; margin-bottom: 24px; }

    /* Forms */
    .form-group{ margin-bottom: 16px; text-align: left; }
    .form-label{
      display: block; font-size: 13px; font-weight: 600;
      color: var(--muted); margin-bottom: 6px; letter-spacing: .3px;
    }
    .form-input, .form-textarea{
      width: 100%; padding: 11px 16px;
      background: rgba(0,0,0,.35); border: 1px solid var(--border);
      border-radius: 14px; color: var(--text); font: inherit; font-size: 15px;
      transition: border-color .2s;
    }
    .form-input:focus, .form-textarea:focus{
      outline: none; border-color: var(--gold);
    }
    .form-textarea{ resize: vertical; min-height: 80px; }
    .form-textarea.tall{ min-height: 220px; }
    .form-error{
      color: #e85454; font-size: 13px; margin-top: 8px;
      min-height: 20px;
    }
    .form-hint{
      color: var(--muted); font-size: 12px; margin-top: 4px;
    }

    /* Admin panel */
    #adminPanel{ display: none; padding: 32px 0 60px; }

    /* Tabs */
    .tab-bar{
      display: flex; gap: 4px; margin-bottom: 28px;
      border-bottom: 1px solid rgba(212,175,55,.12); padding-bottom: 0;
    }
    .tab-btn{
      padding: 10px 22px; font-size: 15px; font-weight: 600;
      color: var(--muted); background: transparent; border: none;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: .2s; margin-bottom: -1px;
    }
    .tab-btn:hover{ color: var(--text); }
    .tab-btn.active{
      color: var(--gold2); border-bottom-color: var(--gold);
    }
    .tab-content{ display: none; }
    .tab-content.active{ display: block; }

    /* Header row */
    .section-header{
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-header h3{ margin: 0; font-size: 18px; }

    /* Item rows */
    .item-list{ display: flex; flex-direction: column; gap: 10px; }
    .item-row{
      display: flex; align-items: center; gap: 16px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 16px; padding: 14px 18px;
      transition: .15s;
    }
    .item-row:hover{ border-color: rgba(212,175,55,.4); }
    .item-thumb{
      width: 72px; height: 48px; border-radius: 8px;
      object-fit: cover; background: rgba(0,0,0,.3); flex-shrink: 0;
    }
    .item-info{ flex: 1; min-width: 0; }
    .item-title{
      font-weight: 600; font-size: 15px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-meta{
      font-size: 13px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-actions{ display: flex; gap: 6px; flex-shrink: 0; }
    .pill{
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
      background: rgba(212,175,55,.1); color: var(--gold2);
      border: 1px solid rgba(212,175,55,.18);
    }

    /* Modal */
    .modal-overlay{
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
      align-items: flex-start; justify-content: center;
      padding: 40px 20px; overflow-y: auto;
    }
    .modal-overlay.open{ display: flex; }
    .modal-content{
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px;
      box-shadow: var(--shadow); width: 100%; max-width: 860px;
    }
    .modal-content h3{ margin: 0 0 24px; font-size: 20px; }
    .bilingual-grid{
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
    }
    .lang-col h4{
      font-size: 14px; color: var(--gold2); margin: 0 0 14px;
      padding-bottom: 8px; border-bottom: 1px solid rgba(212,175,55,.12);
    }
    .shared-fields{
      margin-top: 20px; padding-top: 20px;
      border-top: 1px solid rgba(212,175,55,.12);
    }
    .shared-fields-row{
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    .modal-actions{
      display: flex; justify-content: flex-end; gap: 10px;
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid rgba(212,175,55,.12);
    }
    .thumb-preview{
      width: 100%; max-width: 280px; border-radius: 10px;
      margin-top: 8px; display: none;
    }

    /* Toast */
    .toast{
      position: fixed; bottom: 24px; right: 24px; z-index: 200;
      padding: 14px 22px; border-radius: 14px; font-size: 14px; font-weight: 600;
      box-shadow: var(--shadow); transition: .3s; opacity: 0; transform: translateY(10px);
    }
    .toast.show{ opacity: 1; transform: translateY(0); }
    .toast.success{ background: #1a3a1a; color: #6fcf6f; border: 1px solid rgba(111,207,111,.3); }
    .toast.error{ background: #3a1a1a; color: #e85454; border: 1px solid rgba(232,84,84,.3); }

    /* Loading overlay */
    .loading-overlay{
      display: none; position: fixed; inset: 0; z-index: 150;
      background: rgba(0,0,0,.5); backdrop-filter: blur(3px);
      align-items: center; justify-content: center;
    }
    .loading-overlay.show{ display: flex; }
    .spinner{
      width: 40px; height: 40px; border: 3px solid rgba(212,175,55,.2);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

    /* Empty state */
    .empty-state{
      text-align: center; padding: 48px 20px; color: var(--muted); font-size: 15px;
    }

    /* Responsive */
    @media(max-width: 768px){
      .bilingual-grid{ grid-template-columns: 1fr; }
      .shared-fields-row{ grid-template-columns: 1fr; }
      .modal-content{ padding: 24px 18px; }
      .item-row{ flex-wrap: wrap; }
      .item-thumb{ width: 56px; height: 38px; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="index.html">
        <img src="logo.png" class="logo" alt="CGM" />
        <strong>CGM Admin</strong>
      </a>
      <div class="topbar-right" id="topbarRight" style="display:none">
        <span id="userDisplay"></span>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>
  </header>

  <!-- Login screen -->
  <div id="loginScreen">
    <div class="login-box">
      <img src="logo.png" class="logo" alt="CGM" style="width:56px;height:56px;margin-bottom:16px;" />
      <h2>Admin Login</h2>
      <p>Sign in to manage teachings and articles</p>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-input" id="loginUser" placeholder="GitHub username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="loginToken" placeholder="GitHub Personal Access Token" autocomplete="current-password" />
        <div class="form-hint">Generate at GitHub &rarr; Settings &rarr; Developer settings &rarr; Personal access tokens</div>
      </div>
      <div class="form-error" id="loginError"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="login()">Sign In</button>
    </div>
  </div>

  <!-- Admin panel -->
  <div id="adminPanel" class="wrap">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="teachings" onclick="switchTab('teachings')">Teachings</button>
      <button class="tab-btn" data-tab="articles" onclick="switchTab('articles')">Articles</button>
    </div>

    <!-- Teachings tab -->
    <div class="tab-content active" id="teachingsTab">
      <div class="section-header">
        <h3>Teaching Videos</h3>
        <button class="btn btn-primary btn-sm" onclick="openTeachingModal()">+ Add Teaching</button>
      </div>
      <div class="item-list" id="teachingsList"></div>
    </div>

    <!-- Articles tab -->
    <div class="tab-content" id="articlesTab">
      <div class="section-header">
        <h3>Articles</h3>
        <button class="btn btn-primary btn-sm" onclick="openArticleModal()">+ Add Article</button>
      </div>
      <div class="item-list" id="articlesList"></div>
    </div>
  </div>

  <!-- Teaching modal -->
  <div class="modal-overlay" id="teachingModal">
    <div class="modal-content">
      <h3 id="teachingModalTitle">Add Teaching</h3>
      <div class="bilingual-grid">
        <div class="lang-col">
          <h4>English</h4>
          <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" class="form-input" id="tEnTitle" placeholder="Teaching title" />
          </div>
          <div class="form-group">
            <label class="form-label">Excerpt</label>
            <textarea class="form-textarea" id="tEnExcerpt" placeholder="Short description"></textarea>
          </div>
        </div>
        <div class="lang-col">
          <h4>Tigrinya</h4>
          <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" class="form-input" id="tTigTitle" placeholder="ኣርእስቲ" />
          </div>
          <div class="form-group">
            <label class="form-label">Excerpt</label>
            <textarea class="form-textarea" id="tTigExcerpt" placeholder="ሓጺር መግለጺ"></textarea>
          </div>
        </div>
      </div>
      <div class="shared-fields">
        <div class="form-group">
          <label class="form-label">YouTube URL</label>
          <input type="text" class="form-input" id="tVideoUrl" placeholder="https://www.youtube.com/watch?v=..." oninput="previewThumb()" />
          <img class="thumb-preview" id="tThumbPreview" alt="Thumbnail preview" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('teachingModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveTeaching()">Save</button>
      </div>
    </div>
  </div>

  <!-- Article modal -->
  <div class="modal-overlay" id="articleModal">
    <div class="modal-content">
      <h3 id="articleModalTitle">Add Article</h3>
      <div class="shared-fields" style="border-top:none;padding-top:0;margin-top:0;margin-bottom:20px">
        <div class="shared-fields-row">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" class="form-input" id="aDate" />
          </div>
          <div class="form-group">
            <label class="form-label">Tag (English / Tigrinya)</label>
            <div style="display:flex;gap:10px">
              <input type="text" class="form-input" id="aEnTag" placeholder="Faith" style="flex:1" />
              <input type="text" class="form-input" id="aTigTag" placeholder="እምነት" style="flex:1" />
            </div>
          </div>
        </div>
      </div>
      <div class="bilingual-grid">
        <div class="lang-col">
          <h4>English</h4>
          <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" class="form-input" id="aEnTitle" placeholder="Article title" />
          </div>
          <div class="form-group">
            <label class="form-label">Excerpt</label>
            <textarea class="form-textarea" id="aEnExcerpt" placeholder="Short summary"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Body (Markdown)</label>
            <textarea class="form-textarea tall" id="aEnBody" placeholder="Write the article content in Markdown..."></textarea>
          </div>
        </div>
        <div class="lang-col">
          <h4>Tigrinya</h4>
          <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" class="form-input" id="aTigTitle" placeholder="ኣርእስቲ" />
          </div>
          <div class="form-group">
            <label class="form-label">Excerpt</label>
            <textarea class="form-textarea" id="aTigExcerpt" placeholder="ሓጺር ትሕዝቶ"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Body (Markdown)</label>
            <textarea class="form-textarea tall" id="aTigBody" placeholder="ትሕዝቶ ጽሑፍ ብMarkdown ጸሓፉ..."></textarea>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('articleModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveArticle()">Save</button>
      </div>
    </div>
  </div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <!-- Toast container -->
  <div id="toastContainer"></div>

  <script>
    /* ── Config ── */
    const OWNER  = 'HenokDanielbfg';
    const REPO   = 'cgm-website';
    const BRANCH = 'main';
    const API    = 'https://api.github.com';

    /* ── State ── */
    let token = localStorage.getItem('cgm-admin-token') || '';
    let username = localStorage.getItem('cgm-admin-user') || '';
    let teachings = [], teachingsTig = [];
    let articles = [], articlesTig = [];
    let fileShas = {};
    let editingIndex = -1;
    let savingInProgress = false;

    /* ── UTF-8 safe base64 ── */
    function utf8ToBase64(str) {
      return btoa(new TextEncoder().encode(str).reduce((s, b) => s + String.fromCharCode(b), ''));
    }
    function base64ToUtf8(b64) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    }

    /* ── GitHub API helpers ── */
    async function apiGet(path) {
      const res = await fetch(API + path, {
        headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (!res.ok) throw new Error('API error: ' + res.status);
      return res;
    }

    async function getFile(filePath) {
      try {
        const res = await apiGet('/repos/' + OWNER + '/' + REPO + '/contents/' + encodeURIComponent(filePath) + '?ref=' + BRANCH);
        const data = await res.json();
        return { content: base64ToUtf8(data.content.replace(/\n/g, '')), sha: data.sha };
      } catch (e) {
        return null;
      }
    }

    async function putFile(filePath, content, sha, message) {
      const body = {
        message: message,
        content: utf8ToBase64(content),
        branch: BRANCH
      };
      if (sha) body.sha = sha;
      const res = await fetch(API + '/repos/' + OWNER + '/' + REPO + '/contents/' + encodeURIComponent(filePath), {
        method: 'PUT',
        headers: {
          'Authorization': 'token ' + token,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || 'Failed to save file');
      }
      return res.json();
    }

    async function deleteGitFile(filePath, sha, message) {
      const res = await fetch(API + '/repos/' + OWNER + '/' + REPO + '/contents/' + encodeURIComponent(filePath), {
        method: 'DELETE',
        headers: {
          'Authorization': 'token ' + token,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message: message, sha: sha, branch: BRANCH })
      });
      if (!res.ok) throw new Error('Failed to delete file');
      return res.json();
    }

    /* ── Auth ── */
    async function verifyToken() {
      try {
        const userRes = await apiGet('/user');
        const user = await userRes.json();
        if (user.login.toLowerCase() !== username.toLowerCase()) {
          throw new Error('Token does not match username');
        }
        const collabRes = await fetch(API + '/repos/' + OWNER + '/' + REPO + '/collaborators/' + username, {
          headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (collabRes.status !== 204) throw new Error('Not a collaborator on this repository');
        return true;
      } catch (e) {
        throw e;
      }
    }

    async function login() {
      const user = document.getElementById('loginUser').value.trim();
      const tok = document.getElementById('loginToken').value.trim();
      const errEl = document.getElementById('loginError');
      if (!user || !tok) { errEl.textContent = 'Please enter both fields'; return; }
      errEl.textContent = '';
      username = user;
      token = tok;
      showLoading();
      try {
        await verifyToken();
        localStorage.setItem('cgm-admin-token', token);
        localStorage.setItem('cgm-admin-user', username);
        await showAdmin();
      } catch (e) {
        errEl.textContent = e.message || 'Login failed';
        token = ''; username = '';
      } finally {
        hideLoading();
      }
    }

    function logout() {
      localStorage.removeItem('cgm-admin-token');
      localStorage.removeItem('cgm-admin-user');
      token = ''; username = '';
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('topbarRight').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginUser').value = '';
      document.getElementById('loginToken').value = '';
    }

    /* ── Load data ── */
    async function loadData() {
      const [tEn, tTig, aEn, aTig] = await Promise.all([
        getFile('teachings.json'),
        getFile('teachings_tig.json'),
        getFile('articles.json'),
        getFile('articles_tig.json')
      ]);
      teachings = tEn ? JSON.parse(tEn.content) : [];
      teachingsTig = tTig ? JSON.parse(tTig.content) : [];
      articles = aEn ? JSON.parse(aEn.content) : [];
      articlesTig = aTig ? JSON.parse(aTig.content) : [];
      fileShas = {
        'teachings.json': tEn ? tEn.sha : null,
        'teachings_tig.json': tTig ? tTig.sha : null,
        'articles.json': aEn ? aEn.sha : null,
        'articles_tig.json': aTig ? aTig.sha : null
      };
    }

    async function refreshShas() {
      const [tEn, tTig, aEn, aTig] = await Promise.all([
        getFile('teachings.json'),
        getFile('teachings_tig.json'),
        getFile('articles.json'),
        getFile('articles_tig.json')
      ]);
      if (tEn) fileShas['teachings.json'] = tEn.sha;
      if (tTig) fileShas['teachings_tig.json'] = tTig.sha;
      if (aEn) fileShas['articles.json'] = aEn.sha;
      if (aTig) fileShas['articles_tig.json'] = aTig.sha;
    }

    /* ── Show admin ── */
    async function showAdmin() {
      showLoading();
      try {
        await loadData();
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('topbarRight').style.display = 'flex';
        document.getElementById('userDisplay').textContent = username;
        renderTeachings();
        renderArticles();
      } catch (e) {
        showToast('Failed to load data: ' + e.message, 'error');
      } finally {
        hideLoading();
      }
    }

    /* ── Tabs ── */
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === name + 'Tab'));
    }

    /* ── Render lists ── */
    function renderTeachings() {
      const list = document.getElementById('teachingsList');
      if (!teachings.length) {
        list.innerHTML = '<div class="empty-state">No teachings yet. Add your first one!</div>';
        return;
      }
      list.innerHTML = teachings.map((t, i) => `
        <div class="item-row">
          <img class="item-thumb" src="${t.thumbnail}" alt="" />
          <div class="item-info">
            <div class="item-title">${esc(t.title)}</div>
            <div class="item-meta">${esc(t.excerpt)}</div>
          </div>
          <div class="item-actions">
            <button class="btn btn-outline btn-sm" onclick="editTeaching(${i})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteTeaching(${i})">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function renderArticles() {
      const list = document.getElementById('articlesList');
      if (!articles.length) {
        list.innerHTML = '<div class="empty-state">No articles yet. Add your first one!</div>';
        return;
      }
      list.innerHTML = articles.map((a, i) => `
        <div class="item-row">
          <span class="pill">${esc(a.tag)}</span>
          <div class="item-info">
            <div class="item-title">${esc(a.title)}</div>
            <div class="item-meta">${a.date} &mdash; ${esc(a.excerpt)}</div>
          </div>
          <div class="item-actions">
            <button class="btn btn-outline btn-sm" onclick="editArticle(${i})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteArticle(${i})">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    /* ── Teaching modal ── */
    function openTeachingModal(index) {
      editingIndex = typeof index === 'number' ? index : -1;
      document.getElementById('teachingModalTitle').textContent = editingIndex >= 0 ? 'Edit Teaching' : 'Add Teaching';
      if (editingIndex >= 0) {
        const en = teachings[editingIndex];
        const tig = teachingsTig[editingIndex] || {};
        document.getElementById('tEnTitle').value = en.title || '';
        document.getElementById('tEnExcerpt').value = en.excerpt || '';
        document.getElementById('tTigTitle').value = tig.title || '';
        document.getElementById('tTigExcerpt').value = tig.excerpt || '';
        document.getElementById('tVideoUrl').value = en.video || '';
        previewThumb();
      } else {
        document.getElementById('tEnTitle').value = '';
        document.getElementById('tEnExcerpt').value = '';
        document.getElementById('tTigTitle').value = '';
        document.getElementById('tTigExcerpt').value = '';
        document.getElementById('tVideoUrl').value = '';
        document.getElementById('tThumbPreview').style.display = 'none';
      }
      document.getElementById('teachingModal').classList.add('open');
    }
    function editTeaching(i) { openTeachingModal(i); }

    function previewThumb() {
      const url = document.getElementById('tVideoUrl').value;
      const id = extractVideoId(url);
      const img = document.getElementById('tThumbPreview');
      if (id) {
        img.src = 'https://i.ytimg.com/vi/' + id + '/hqdefault.jpg';
        img.style.display = 'block';
      } else {
        img.style.display = 'none';
      }
    }

    function extractVideoId(url) {
      const m = url.match(/(?:v=|\/embed\/|\.be\/)([a-zA-Z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    async function saveTeaching() {
      if (savingInProgress) return;
      const enTitle = document.getElementById('tEnTitle').value.trim();
      const enExcerpt = document.getElementById('tEnExcerpt').value.trim();
      const tigTitle = document.getElementById('tTigTitle').value.trim();
      const tigExcerpt = document.getElementById('tTigExcerpt').value.trim();
      const videoUrl = document.getElementById('tVideoUrl').value.trim();

      if (!enTitle || !videoUrl) {
        showToast('English title and YouTube URL are required', 'error');
        return;
      }

      const videoId = extractVideoId(videoUrl);
      const thumbnail = videoId ? 'https://i.ytimg.com/vi/' + videoId + '/hqdefault.jpg' : '';

      const enObj = { title: enTitle, excerpt: enExcerpt, thumbnail: thumbnail, video: videoUrl };
      const tigObj = { title: tigTitle || enTitle, excerpt: tigExcerpt || enExcerpt, thumbnail: thumbnail, video: videoUrl };

      if (editingIndex >= 0) {
        teachings[editingIndex] = enObj;
        teachingsTig[editingIndex] = tigObj;
      } else {
        teachings.push(enObj);
        teachingsTig.push(tigObj);
      }

      savingInProgress = true;
      showLoading();
      try {
        await refreshShas();
        const r1 = await putFile('teachings.json', JSON.stringify(teachings, null, 2) + '\n', fileShas['teachings.json'],
          (editingIndex >= 0 ? 'Update' : 'Add') + ' teaching: ' + enTitle);
        fileShas['teachings.json'] = r1.content.sha;

        const r2 = await putFile('teachings_tig.json', JSON.stringify(teachingsTig, null, 2) + '\n', fileShas['teachings_tig.json'],
          (editingIndex >= 0 ? 'Update' : 'Add') + ' teaching (Tigrinya): ' + tigTitle);
        fileShas['teachings_tig.json'] = r2.content.sha;

        closeModal('teachingModal');
        renderTeachings();
        showToast('Teaching saved successfully!', 'success');
      } catch (e) {
        showToast('Save failed: ' + e.message, 'error');
        await loadData();
        renderTeachings();
      } finally {
        savingInProgress = false;
        hideLoading();
      }
    }

    async function deleteTeaching(index) {
      if (!confirm('Delete "' + teachings[index].title + '"? This cannot be undone.')) return;
      teachings.splice(index, 1);
      teachingsTig.splice(index, 1);
      showLoading();
      try {
        await refreshShas();
        const r1 = await putFile('teachings.json', JSON.stringify(teachings, null, 2) + '\n', fileShas['teachings.json'], 'Delete teaching');
        fileShas['teachings.json'] = r1.content.sha;
        const r2 = await putFile('teachings_tig.json', JSON.stringify(teachingsTig, null, 2) + '\n', fileShas['teachings_tig.json'], 'Delete teaching (Tigrinya)');
        fileShas['teachings_tig.json'] = r2.content.sha;
        renderTeachings();
        showToast('Teaching deleted', 'success');
      } catch (e) {
        showToast('Delete failed: ' + e.message, 'error');
        await loadData();
        renderTeachings();
      } finally {
        hideLoading();
      }
    }

    /* ── Article modal ── */
    function openArticleModal(index) {
      editingIndex = typeof index === 'number' ? index : -1;
      document.getElementById('articleModalTitle').textContent = editingIndex >= 0 ? 'Edit Article' : 'Add Article';
      if (editingIndex >= 0) {
        const en = articles[editingIndex];
        const tig = articlesTig[editingIndex] || {};
        document.getElementById('aEnTitle').value = en.title || '';
        document.getElementById('aEnExcerpt').value = en.excerpt || '';
        document.getElementById('aEnTag').value = en.tag || '';
        document.getElementById('aTigTitle').value = tig.title || '';
        document.getElementById('aTigExcerpt').value = tig.excerpt || '';
        document.getElementById('aTigTag').value = tig.tag || '';
        document.getElementById('aDate').value = en.date || '';
        // Load markdown content
        loadArticleBodies(en.md, tig.md);
      } else {
        document.getElementById('aEnTitle').value = '';
        document.getElementById('aEnExcerpt').value = '';
        document.getElementById('aEnTag').value = '';
        document.getElementById('aTigTitle').value = '';
        document.getElementById('aTigExcerpt').value = '';
        document.getElementById('aTigTag').value = '';
        document.getElementById('aDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('aEnBody').value = '';
        document.getElementById('aTigBody').value = '';
      }
      document.getElementById('articleModal').classList.add('open');
    }
    function editArticle(i) { openArticleModal(i); }

    async function loadArticleBodies(enMd, tigMd) {
      const [enFile, tigFile] = await Promise.all([
        enMd ? getFile(enMd) : null,
        tigMd ? getFile(tigMd) : null
      ]);
      document.getElementById('aEnBody').value = enFile ? enFile.content : '';
      document.getElementById('aTigBody').value = tigFile ? tigFile.content : '';
    }

    function slugify(text) {
      return text.toLowerCase().replace(/[^a-z0-9\u1200-\u137F]+/g, '-').replace(/^-|-$/g, '');
    }

    async function saveArticle() {
      if (savingInProgress) return;
      const enTitle = document.getElementById('aEnTitle').value.trim();
      const enExcerpt = document.getElementById('aEnExcerpt').value.trim();
      const enTag = document.getElementById('aEnTag').value.trim();
      const tigTitle = document.getElementById('aTigTitle').value.trim();
      const tigExcerpt = document.getElementById('aTigExcerpt').value.trim();
      const tigTag = document.getElementById('aTigTag').value.trim();
      const date = document.getElementById('aDate').value;
      const enBody = document.getElementById('aEnBody').value;
      const tigBody = document.getElementById('aTigBody').value;

      if (!enTitle || !date) {
        showToast('English title and date are required', 'error');
        return;
      }

      const enId = slugify(enTitle);
      const tigId = tigTitle ? slugify(tigTitle) : enId;
      const enMdPath = 'articles/' + enId + '.md';
      const tigMdPath = 'articles/' + tigId + '.md';

      const enObj = { id: enId, title: enTitle, excerpt: enExcerpt, date: date, tag: enTag, md: enMdPath };
      const tigObj = { id: tigId, title: tigTitle || enTitle, excerpt: tigExcerpt || enExcerpt, date: date, tag: tigTag || enTag, md: tigMdPath };

      // Track old md paths for cleanup if title changed
      let oldEnMd = null, oldTigMd = null;
      if (editingIndex >= 0) {
        oldEnMd = articles[editingIndex].md;
        oldTigMd = articlesTig[editingIndex] ? articlesTig[editingIndex].md : null;
        articles[editingIndex] = enObj;
        articlesTig[editingIndex] = tigObj;
      } else {
        articles.push(enObj);
        articlesTig.push(tigObj);
      }

      savingInProgress = true;
      showLoading();
      try {
        // Get current SHAs for markdown files
        const [enMdFile, tigMdFile] = await Promise.all([
          getFile(enMdPath),
          tigBody ? getFile(tigMdPath) : null
        ]);

        // Save markdown files
        if (enBody) {
          const r = await putFile(enMdPath, enBody, enMdFile ? enMdFile.sha : null,
            (editingIndex >= 0 ? 'Update' : 'Add') + ' article: ' + enTitle);
        }
        if (tigBody) {
          const r = await putFile(tigMdPath, tigBody, tigMdFile ? tigMdFile.sha : null,
            (editingIndex >= 0 ? 'Update' : 'Add') + ' article (Tigrinya): ' + tigTitle);
        }

        // Delete old md files if path changed
        if (oldEnMd && oldEnMd !== enMdPath) {
          const old = await getFile(oldEnMd);
          if (old) await deleteGitFile(oldEnMd, old.sha, 'Remove old article file: ' + oldEnMd);
        }
        if (oldTigMd && oldTigMd !== tigMdPath) {
          const old = await getFile(oldTigMd);
          if (old) await deleteGitFile(oldTigMd, old.sha, 'Remove old article file: ' + oldTigMd);
        }

        // Save JSON files
        await refreshShas();
        const r1 = await putFile('articles.json', JSON.stringify(articles, null, 2) + '\n', fileShas['articles.json'],
          (editingIndex >= 0 ? 'Update' : 'Add') + ' article metadata: ' + enTitle);
        fileShas['articles.json'] = r1.content.sha;

        const r2 = await putFile('articles_tig.json', JSON.stringify(articlesTig, null, 2) + '\n', fileShas['articles_tig.json'],
          (editingIndex >= 0 ? 'Update' : 'Add') + ' article metadata (Tigrinya): ' + tigTitle);
        fileShas['articles_tig.json'] = r2.content.sha;

        closeModal('articleModal');
        renderArticles();
        showToast('Article saved successfully!', 'success');
      } catch (e) {
        showToast('Save failed: ' + e.message, 'error');
        await loadData();
        renderArticles();
      } finally {
        savingInProgress = false;
        hideLoading();
      }
    }

    async function deleteArticle(index) {
      if (!confirm('Delete "' + articles[index].title + '"? This will also delete the markdown files.')) return;
      const enMd = articles[index].md;
      const tigMd = articlesTig[index] ? articlesTig[index].md : null;
      articles.splice(index, 1);
      articlesTig.splice(index, 1);

      showLoading();
      try {
        // Delete markdown files
        const enFile = await getFile(enMd);
        if (enFile) await deleteGitFile(enMd, enFile.sha, 'Delete article: ' + enMd);
        if (tigMd) {
          const tigFile = await getFile(tigMd);
          if (tigFile) await deleteGitFile(tigMd, tigFile.sha, 'Delete article (Tigrinya): ' + tigMd);
        }

        // Update JSON files
        await refreshShas();
        const r1 = await putFile('articles.json', JSON.stringify(articles, null, 2) + '\n', fileShas['articles.json'], 'Delete article metadata');
        fileShas['articles.json'] = r1.content.sha;
        const r2 = await putFile('articles_tig.json', JSON.stringify(articlesTig, null, 2) + '\n', fileShas['articles_tig.json'], 'Delete article metadata (Tigrinya)');
        fileShas['articles_tig.json'] = r2.content.sha;

        renderArticles();
        showToast('Article deleted', 'success');
      } catch (e) {
        showToast('Delete failed: ' + e.message, 'error');
        await loadData();
        renderArticles();
      } finally {
        hideLoading();
      }
    }

    /* ── Modal helpers ── */
    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
      editingIndex = -1;
    }

    // Close modal on overlay click
    document.querySelectorAll('.modal-overlay').forEach(m => {
      m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); });
    });

    // Close modal on Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.open').forEach(m => closeModal(m.id));
      }
    });

    /* ── Toast ── */
    function showToast(msg, type) {
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = msg;
      document.getElementById('toastContainer').appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    /* ── Loading ── */
    function showLoading() { document.getElementById('loadingOverlay').classList.add('show'); }
    function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

    /* ── Init ── */
    (async function init() {
      if (token && username) {
        showLoading();
        try {
          await verifyToken();
          await showAdmin();
        } catch (e) {
          logout();
        } finally {
          hideLoading();
        }
      }
    })();

    // Allow Enter key to submit login
    document.getElementById('loginToken').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
